<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Infinity Web</title>

<style>
:root {
  --bg-color: #ffffff;
  --text-color: #111;
}

body {
  margin: 0;
  font-family: system-ui, sans-serif;
  background: var(--bg-color);
  color: var(--text-color);
}

.header {
  height: 56px;
  background: #333;
  color: white;
  display: flex;
  align-items: center;
  padding: 0 16px;
}

.main {
  display: flex;
}

.sidebar {
  width: 220px;
  border-right: 1px solid #ddd;
  padding: 16px;
}

.content {
  flex: 1;
  padding: 24px;
}
</style>
</head>

<body>

<div id="app"></div>

<script>
/* ===== constants.js ===== */
const THEME_MODES = { LIGHT: 'light', DARK: 'dark' };

/* ===== theme.js ===== */
function applyTheme(theme = THEME_MODES.LIGHT) {
  const root = document.documentElement;
  if (theme === 'dark') {
    root.style.setProperty('--bg-color', '#121212');
    root.style.setProperty('--text-color', '#fff');
  } else {
    root.style.setProperty('--bg-color', '#ffffff');
    root.style.setProperty('--text-color', '#111');
  }
}

/* ===== layout.js ===== */
function renderLayout() {
  const div = document.createElement('div');
  div.innerHTML = `
    <div class="header">Infinity Web</div>
    <div class="main">
      <div class="sidebar">
        <p><a href="#">Docs</a></p>
        <p><a href="#">Search</a></p>
      </div>
      <div class="content" id="content">
        <h1>Welcome</h1>
        <p>Your system is now rendering correctly.</p>
      </div>
    </div>
  `;
  return div;
}

/* ===== root.js ===== */
function bootstrap() {
  applyTheme('light');
  const root = document.getElementById('app');
  root.appendChild(renderLayout());
}

document.addEventListener('DOMContentLoaded', bootstrap);
</script>

</body>
</html>
